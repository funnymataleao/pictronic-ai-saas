<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5faff"/>
      <stop offset="100%" stop-color="#eefaf3"/>
    </linearGradient>
    <style>
      .title { font: 700 34px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #111827; }
      .sub { font: 500 18px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #4b5563; }
      .head { font: 700 18px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #0f172a; }
      .txt { font: 500 14px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #334155; }
      .badge { font: 700 12px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #0b8a42; }
      .api { font: 600 12px 'IBM Plex Mono', monospace; fill: #1d4ed8; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="620" fill="url(#bg)"/>

  <text x="52" y="72" class="title">Pictronic: Generate -> Approve -> Upload Queue</text>
  <text x="52" y="102" class="sub">Frontend workflow proof for JUP-4</text>

  <rect x="52" y="150" width="330" height="360" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="74" y="186" class="head">1. Generate Batch</text>
  <text x="74" y="214" class="api">POST /api/projects/:id/generate</text>
  <text x="74" y="246" class="txt">- Prompt, provider, model, batch controls</text>
  <text x="74" y="270" class="txt">- Working state: Generating...</text>
  <text x="74" y="294" class="txt">- Grid updates via refresh + polling</text>
  <rect x="74" y="324" width="110" height="28" rx="14" fill="#eff8ff" stroke="#b2ddff"/>
  <text x="90" y="342" class="badge">generating</text>
  <rect x="196" y="324" width="110" height="28" rx="14" fill="#eff8ff" stroke="#b2ddff"/>
  <text x="212" y="342" class="badge">processing</text>
  <rect x="74" y="360" width="110" height="28" rx="14" fill="#ecfdf3" stroke="#abefc6"/>
  <text x="104" y="378" class="badge">ready</text>
  <rect x="196" y="360" width="110" height="28" rx="14" fill="#fef3f2" stroke="#fecdca"/>
  <text x="232" y="378" class="badge" fill="#b42318">failed</text>

  <rect x="436" y="150" width="330" height="360" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="458" y="186" class="head">2. Review + Approve</text>
  <text x="458" y="214" class="api">POST /api/assets/:id/approve</text>
  <text x="458" y="236" class="api">PATCH /api/assets/:id/metadata</text>
  <text x="458" y="258" class="api">POST /api/assets/:id/metadata/regenerate</text>
  <text x="458" y="292" class="txt">- Asset card actions + Lightbox editor</text>
  <text x="458" y="316" class="txt">- Inline title/tags editing + save</text>
  <text x="458" y="340" class="txt">- Metadata fallback for timeout/failed</text>
  <rect x="458" y="368" width="112" height="28" rx="14" fill="#ecfdf3" stroke="#abefc6"/>
  <text x="484" y="386" class="badge">approved</text>
  <rect x="582" y="368" width="130" height="28" rx="14" fill="#fef3f2" stroke="#fecdca"/>
  <text x="612" y="386" class="badge" fill="#b42318">meta timeout</text>

  <rect x="820" y="150" width="330" height="360" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="842" y="186" class="head">3. Upload Queue</text>
  <text x="842" y="214" class="api">POST /api/uploads/adobe</text>
  <text x="842" y="236" class="api">GET /api/uploads?projectId=:id</text>
  <text x="842" y="270" class="txt">- Select approved assets</text>
  <text x="842" y="294" class="txt">- Start Adobe Upload action</text>
  <text x="842" y="318" class="txt">- Queue timeline panel with errors</text>
  <rect x="842" y="348" width="100" height="28" rx="14" fill="#eff8ff" stroke="#b2ddff"/>
  <text x="866" y="366" class="badge">queued</text>
  <rect x="948" y="348" width="116" height="28" rx="14" fill="#eff8ff" stroke="#b2ddff"/>
  <text x="970" y="366" class="badge">uploading</text>
  <rect x="842" y="384" width="110" height="28" rx="14" fill="#ecfdf3" stroke="#abefc6"/>
  <text x="867" y="402" class="badge">uploaded</text>
  <rect x="960" y="384" width="90" height="28" rx="14" fill="#fef3f2" stroke="#fecdca"/>
  <text x="982" y="402" class="badge" fill="#b42318">failed</text>

  <line x1="382" y1="330" x2="436" y2="330" stroke="#3b82f6" stroke-width="3"/>
  <polygon points="436,330 424,323 424,337" fill="#3b82f6"/>

  <line x1="766" y1="330" x2="820" y2="330" stroke="#3b82f6" stroke-width="3"/>
  <polygon points="820,330 808,323 808,337" fill="#3b82f6"/>
</svg>
